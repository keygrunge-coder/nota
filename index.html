<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTA - NJ SHOES</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-reset {
            width: 100%;
            padding: 10px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 NOTA</h1>
            <p>NJ SHOES - Input Penjualan</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="notaForm">
            <div class="form-group">
                <label for="tgl">Tanggal</label>
                <input type="date" id="tgl" name="tgl" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="qty">QTY</label>
                    <input type="number" id="qty" name="qty" min="1" required>
                </div>
                <div class="form-group">
                    <label for="harga">Harga (Rp)</label>
                    <input type="number" id="harga" name="harga" min="0" required>
                </div>
            </div>

            <div class="form-group">
                <label for="namaBarang">Nama Barang</label>
                <input type="text" id="namaBarang" name="namaBarang" placeholder="Contoh: 883 smile 43-44" required>
            </div>

            <div class="form-group">
                <label for="total">Total (Otomatis)</label>
                <input type="number" id="total" name="total" readonly>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span>Menyimpan...</span>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">💾 Simpan</button>
            <button type="reset" class="btn-reset">🔄 Reset</button>
        </form>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby7AUYawCKgafTMGcGuuWxwsQbdNLguROdX5FSoVMISSgSx--dV9bparoRFReRb9lxQ/exec";

        // Set tanggal hari ini sebagai default
        document.getElementById("tgl").valueAsDate = new Date();

        // Auto-calculate total
        document.getElementById("qty").addEventListener("change", calculateTotal);
        document.getElementById("harga").addEventListener("change", calculateTotal);

        function calculateTotal() {
            const qty = parseInt(document.getElementById("qty").value) || 0;
            const harga = parseInt(document.getElementById("harga").value) || 0;
            const total = qty * harga;
            document.getElementById("total").value = total;
        }

        // Submit form
        document.getElementById("notaForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const tgl = document.getElementById("tgl").value;
            const qty = document.getElementById("qty").value;
            const namaBarang = document.getElementById("namaBarang").value;
            const harga = document.getElementById("harga").value;
            const total = document.getElementById("total").value;

            // Format tanggal ke DD/MM/YYYY
            const date = new Date(tgl);
            const tglFormatted = `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${date.getFullYear()}`;

            const data = {
                tgl: tglFormatted,
                qty: parseInt(qty),
                namaBarang: namaBarang,
                harga: parseInt(harga),
                total: parseInt(total)
            };

            showLoading(true);
            showAlert("", "");

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain"
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.status === "success") {
                    showAlert("✓ " + result.message, "success");
                    document.getElementById("notaForm").reset();
                    document.getElementById("tgl").valueAsDate = new Date();
                    setTimeout(() => showAlert("", ""), 3000);
                } else {
                    showAlert("✗ " + result.message, "error");
                }
            } catch (error) {
                console.error("Error:", error);
                showAlert("✗ Error: " + error.message, "error");
            } finally {
                showLoading(false);
            }
        });

        function showLoading(show) {
            document.getElementById("loading").style.display = show ? "block" : "none";
            document.getElementById("submitBtn").disabled = show;
        }

        function showAlert(message, type) {
            const alertEl = document.getElementById("alert");
            alertEl.textContent = message;
            alertEl.className = "alert";
            if (type) {
                alertEl.classList.add(type);
            }
        }
    </script>
</body>
</html>
