<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Nota Manager</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; margin: 0; }
        h2 { text-align: center; color: #333; }
        .menu-grid { display: grid; gap: 15px; margin-top: 20px; }
        .btn-toko { padding: 20px; background: #ffffff; border: 2px solid #007bff; color: #007bff; text-align: center; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-toko:active { background: #007bff; color: white; }
    </style>
</head>
<body>

    <h2>Terminal Nota</h2>
    <div class="menu-grid">
        <a href="toko/aldi.html" class="btn-toko">📦 Nota Aldi</a>
        <a href="toko/leora.html" class="btn-toko">📦 Nota Leora</a>
        <a href="toko/nj.html" class="btn-toko">📦 Nota NJ Shoes</a>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log("PWA Aktif"));
        }
    </script>
</body>
</html>
