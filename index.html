<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJ Shoes</title>
    <link rel="manifest" href="manifest.json">
    <style>:root{
    --primary:#003399;
    --primary-hover:#002b80;
    --success:#10b981;
    --warning:#f59e0b;
    --danger:#ef4444;
    --bg:#f4f6fb;
    --card:#ffffff;
    --text:#334155;
    --muted:#64748b;
    --radius:14px;
    --shadow:0 4px 10px rgba(0,0,0,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    max-width:520px;
    margin:auto;
    padding:12px;
}

.header-box{
    background:var(--primary);
    color:#fff;
    padding:18px;
    border-radius:var(--radius);
    text-align:center;
    margin-bottom:15px;
    box-shadow:var(--shadow);
}

.header-box h1,
.header-box h2,
.header-box h3{
    margin-bottom:6px;
}

.btn-nav{
    display:inline-block;
    margin-top:10px;
    background:#fff;
    color:var(--primary);
    padding:8px 15px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    transition:.2s;
}

.btn-nav:hover{
    background:#e5e7eb;
}

.card{
    background:#fff;
    border-radius:var(--radius);
    padding:15px;
    margin-bottom:15px;
    box-shadow:var(--shadow);
}

.dash-container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:15px;
}

.dash-card{
    background:#fff;
    border-radius:12px;
    text-align:center;
    padding:12px;
    box-shadow:var(--shadow);
}

.dash-card h4{
    color:var(--muted);
    font-size:12px;
    margin-bottom:5px;
}

.dash-card p{
    font-size:22px;
    font-weight:bold;
    color:var(--primary);
}

#bca-indicator{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#ff3333;
    margin:15px auto;
    transition:.3s;
    box-shadow:0 0 15px rgba(0,0,0,.25);
}

#status-message{
    text-align:center;
    font-weight:bold;
    margin-bottom:15px;
}

#reader{
    width:100%;
    min-height:260px;
    border-radius:12px;
    overflow:hidden;
    background:#000;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
}

.btn-primary{
    background:var(--primary);
    color:#fff;
}

.btn-primary:hover{
    background:var(--primary-hover);
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:10px;
    margin-bottom:10px;
    outline:none;
}

input:focus,
textarea:focus{
    border-color:var(--primary);
}

.history-container{
    max-height:280px;
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,
td{
    padding:10px;
    border-bottom:1px solid #eee;
    font-size:13px;
}

th{
    background:#f8fafc;
    position:sticky;
    top:0;
}

.badge{
    padding:4px 8px;
    border-radius:6px;
    font-size:11px;
    font-weight:bold;
}

.badge-keluar{
    background:#dcfce7;
    color:#166534;
}

.badge-kembali{
    background:#dcfce7;
    color:#166534;
}

.badge-duplikat{
    background:#fee2e2;
    color:#b91c1c;
}

.badge-invalid{
    background:#fef3c7;
    color:#92400e;
}

#notif{
    display:none;
    position:fixed;
    left:50%;
    top:15px;
    transform:translateX(-50%);
    padding:12px 20px;
    color:#fff;
    font-weight:bold;
    border-radius:10px;
    z-index:9999;
}

.success{
    background:var(--success);
}

.warning{
    background:var(--warning);
}

.error{
    background:var(--danger);
}

.menu{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.menu-card{
    display:flex;
    align-items:center;
    background:#fff;
    text-decoration:none;
    color:#111827;
    border-radius:14px;
    padding:16px;
    box-shadow:var(--shadow);
    transition:.2s;
}

.menu-card:active{
    transform:scale(.98);
}

.menu-icon{
    font-size:32px;
    width:55px;
    text-align:center;
}

.menu-text{
    flex:1;
}

.menu-text h3{
    font-size:17px;
    margin-bottom:3px;
}

.menu-text p{
    font-size:13px;
    color:#64748b;
}

.menu-arrow{
    font-size:24px;
    color:#9ca3af;
}

.footer{
    text-align:center;
    color:#64748b;
    font-size:12px;
    margin:20px 0;
}
    </style>
</head>
<body>

<div class="container">
    <h2>NJ Shoes App</h2>
    
    <table id="barangTable">
        <tr><td>Tgl:</td><td><input type="date" id="tgl"></td></tr>
        <tr><td>Barang:</td><td><input type="text" id="barang" placeholder="Nama Barang"></td></tr>
        <tr><td>Qty:</td><td><input type="number" id="qty" placeholder="0"></td></tr>
        <tr><td>Harga:</td><td><input type="number" id="harga" placeholder="35 (dalam ribuan)"></td></tr>
    </table>
    <button id="btnSimpanBarang">Simpan Barang</button>

    <hr>

    <h3>Input Transfer</h3>
    <input type="date" id="tglTF">
    <input type="number" id="nominalTF" placeholder="Nominal (Ribuan)">
    <textarea id="rincianTF" rows="2" placeholder="Rincian"></textarea>
    <button id="btnSimpanTransfer">Simpan Transfer</button>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycby7AUYawCKgafTMGcGuuWxwsQbdNLguROdX5FSoVMISSgSx--dV9bparoRFReRb9lxQ/exec";

    // Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Error:', err));
    }

    // Fungsi Simpan Barang
    document.getElementById("btnSimpanBarang").onclick = async () => {
        let data = [{ 
            tanggal: document.getElementById("tgl").value, 
            qty: document.getElementById("qty").value, 
            barang: document.getElementById("barang").value, 
            harga: document.getElementById("harga").value, 
            jumlah: 0 
        }];
        fetch(URL, { method: "POST", body: JSON.stringify({ action: "simpanBarang", data: data }) })
            .then(res => res.json())
            .then(res => alert("Barang Tersimpan: " + res.status));
    };

    // Fungsi Simpan Transfer
    document.getElementById("btnSimpanTransfer").onclick = async () => {
        let payload = { 
            action: "simpanTransfer", 
            tanggal: document.getElementById("tglTF").value, 
            nominal: document.getElementById("nominalTF").value, 
            rincian: document.getElementById("rincianTF").value 
        };
        fetch(URL, { method: "POST", body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(res => alert("Transfer Tersimpan: " + res.status));
    };
</script>

</body>
</html>
