<!DOCTYPE html>
<html>
<head>
<style>
        /* CSS BIAR RAPI */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2, h3 { color: #333; margin-top: 0; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        #btnSimpanBarang { background: #007bff; color: white; }
        #btnSimpanTransfer { background: #28a745; color: white; }
        
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NJ Shoes</title>
</head>
<body>
    <h2>NJ Shoes App</h2>
    
    <table id="barangTable">
        <tr><td>Tgl:</td><td><input type="date" id="tgl"></td></tr>
        <tr><td>Barang:</td><td><input type="text" id="barang"></td></tr>
        <tr><td>Qty:</td><td><input type="number" id="qty"></td></tr>
        <tr><td>Harga:</td><td><input type="number" id="harga"></td></tr>
    </table>
    <button id="btnSimpanBarang">Simpan Barang</button>

    <hr>

    <h3>Input Transfer</h3>
    <input type="date" id="tglTF">
    <input type="number" id="nominalTF" placeholder="Nominal">
    <textarea id="rincianTF" placeholder="Rincian"></textarea>
    <button id="btnSimpanTransfer">Simpan Transfer</button>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycby7AUYawCKgafTMGcGuuWxwsQbdNLguROdX5FSoVMISSgSx--dV9bparoRFReRb9lxQ/exec";

        // Fungsi Simpan Barang
        document.getElementById("btnSimpanBarang").onclick = async () => {
            let data = [{ tanggal: document.getElementById("tgl").value, qty: document.getElementById("qty").value, barang: document.getElementById("barang").value, harga: document.getElementById("harga").value, jumlah: 0 }];
            fetch(URL, { method: "POST", body: JSON.stringify({ action: "simpanBarang", data: data }) }).then(() => alert("Tersimpan"));
        };

        // Fungsi Simpan Transfer
        document.getElementById("btnSimpanTransfer").onclick = async () => {
            let payload = { action: "simpanTransfer", tanggal: document.getElementById("tglTF").value, nominal: document.getElementById("nominalTF").value, rincian: document.getElementById("rincianTF").value };
            fetch(URL, { method: "POST", body: JSON.stringify(payload) }).then(() => alert("Transfer Tersimpan"));
        };
    </script>
</body>
</html>
